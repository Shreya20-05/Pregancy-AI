<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - PregnancyAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md p-8 text-center">
        <div class="text-6xl mb-4">❌</div>
        <h1 class="text-2xl font-bold text-red-600 mb-3">Error</h1>
        <p class="text-gray-700 mb-6">{{ message }}</p>
        <a href="/dashboard" class="bg-pink-600 text-white px-6 py-2 rounded-lg hover:bg-pink-700 transition">
            Back to Dashboard
        </a>
    </div>
</body>
</html>
